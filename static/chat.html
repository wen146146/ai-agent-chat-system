<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f0f; height: 100vh; display: flex; color: #e5e5e5; }
        
        /* 侧边栏 */
        .sidebar { width: 280px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; height: 100vh; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid #333; text-align: center; }
        .sidebar-header .logo { font-size: 20px; font-weight: 700; color: #fff; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .sidebar-header .logo span { background: linear-gradient(135deg, #3b82f6, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .new-chat-btn { width: 100%; padding: 10px; background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; box-shadow: 0 2px 8px rgba(59,130,246,0.2); }
        .new-chat-btn:hover { background: linear-gradient(135deg, #2563eb, #1d4ed8); box-shadow: 0 4px 12px rgba(59,130,246,0.3); transform: translateY(-1px); }
        
        /* 知识库区域 */
        .kb-section { padding: 16px; border-bottom: 1px solid #333; }
        .kb-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .kb-section-title { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
        .kb-add-btn { width: 24px; height: 24px; background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 6px; color: #888; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
        .kb-add-btn:hover { background: #333; color: #fff; }
        
        .kb-list { display: flex; flex-direction: column; gap: 6px; }
        .kb-item { padding: 10px 12px; background: #161616; border: 1px solid #2a2a2a; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .kb-item:hover { background: #1e1e1e; border-color: #3a3a3a; }
        .kb-item.active { background: #1e3a5f; border-color: #3b82f6; }
        .kb-item-name { font-size: 13px; color: #ccc; margin-bottom: 4px; }
        .kb-item-info { font-size: 11px; color: #666; }
        
        /* 文档列表 */
        .doc-section { flex: 1; overflow-y: auto; padding: 16px; }
        .doc-section-title { font-size: 12px; color: #666; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .upload-btn { padding: 6px 12px; background: #22c55e; color: #fff; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .upload-btn:hover { background: #16a34a; }
        
        .doc-list { display: flex; flex-direction: column; gap: 8px; }
        .doc-item { padding: 10px 12px; background: #161616; border: 1px solid #2a2a2a; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .doc-info { flex: 1; min-width: 0; }
        .doc-name { font-size: 13px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .doc-meta { font-size: 11px; color: #666; }
        .doc-delete { padding: 4px 8px; background: transparent; border: 1px solid #3a3a3a; border-radius: 4px; color: #888; cursor: pointer; font-size: 11px; }
        .doc-delete:hover { background: #dc2626; border-color: #dc2626; color: #fff; }
        
        .empty-docs { text-align: center; padding: 30px; color: #555; font-size: 13px; }
        
        /* 主内容区 */
        .main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; }
        .main::-webkit-scrollbar { width: 6px; }
        .main::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        .main::-webkit-scrollbar-track { background: transparent; }
        .header { padding: 16px 24px; background: linear-gradient(135deg, #1a1a1a, #1e1e1e); border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .header h1 { font-size: 18px; font-weight: 700; color: #fff; background: linear-gradient(135deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-info { font-size: 12px; color: #666; display: flex; align-items: center; gap: 12px; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #444; }
        .status-dot.connected { background: #22c55e; }
        .status-dot.error { background: #ef4444; }
        
        .chat-container { flex: 1; padding: 24px; display: flex; flex-direction: column; gap: 16px; max-width: 900px; margin: 0 auto; width: 100%; }
        
        .message { display: flex; gap: 12px; max-width: 85%; animation: msgFadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; transition: transform 0.2s; }
        .avatar:hover { transform: scale(1.05); }
        .message.user .avatar { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; box-shadow: 0 2px 8px rgba(59,130,246,0.3); }
        .message.assistant .avatar { background: linear-gradient(135deg, #1a1a1a, #2a2a2a); color: #22c55e; border: 1px solid #333; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .message-content { background: #1e1e1e; border-radius: 14px; padding: 12px 16px; line-height: 1.65; font-size: 14px; border: 1px solid #2a2a2a; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
        .message.user .message-content { background: linear-gradient(135deg, #3b82f6, #2563eb); border-color: #3b82f6; color: #fff; box-shadow: 0 2px 12px rgba(59,130,246,0.2); }
        .message.assistant .message-content { white-space: pre-wrap; border-left: 2px solid #22c55e33; }
        /* Markdown 渲染样式 */
        .message.assistant .message-content h1, .message.assistant .message-content h2, .message.assistant .message-content h3 { margin: 12px 0 6px; color: #f0f0f0; }
        .message.assistant .message-content h1 { font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .message.assistant .message-content h2 { font-size: 16px; }
        .message.assistant .message-content h3 { font-size: 14px; }
        .message.assistant .message-content p { margin: 8px 0; }
        .message.assistant .message-content ul, .message.assistant .message-content ol { margin: 6px 0; padding-left: 24px; }
        .message.assistant .message-content li { margin: 3px 0; }
        .message.assistant .message-content code { background: #2a2a2a; padding: 2px 6px; border-radius: 4px; font-size: 13px; color: #f472b6; }
        .message.assistant .message-content pre { background: #111; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; }
        .message.assistant .message-content pre code { background: none; padding: 0; color: #e5e5e5; }
        .message.assistant .message-content blockquote { border-left: 3px solid #3b82f6; padding-left: 12px; margin: 8px 0; color: #888; }
        .message.assistant .message-content table { border-collapse: collapse; margin: 8px 0; width: 100%; font-size: 13px; }
        .message.assistant .message-content th, .message.assistant .message-content td { border: 1px solid #333; padding: 6px 10px; text-align: left; }
        .message.assistant .message-content th { background: #1a1a1a; color: #ccc; }
        .message.assistant .message-content a { color: #3b82f6; text-decoration: none; }
        .message.assistant .message-content a:hover { text-decoration: underline; }
        .message.assistant .message-content hr { border: none; border-top: 1px solid #333; margin: 12px 0; }
        .msg-time { font-size: 10px; color: #555; margin-top: 6px; text-align: right; opacity: 0; transition: opacity 0.3s; }
        .message:hover .msg-time { opacity: 1; }
        .message.user .msg-time { text-align: left; color: #888; }
        
        .tool-card { background: #161616; border: 1px solid #2a2a2a; border-radius: 8px; padding: 10px 14px; margin-top: 8px; font-size: 13px; }
        .tool-card .tool-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .tool-badge { background: #f59e0b; color: #000; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .tool-name { color: #a1a1aa; font-size: 12px; }
        .tool-result { color: #a1a1aa; font-size: 12px; border-top: 1px solid #2a2a2a; margin-top: 6px; padding-top: 6px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
        
        .typing-indicator { display: flex; gap: 4px; padding: 12px 16px; }
        .typing-indicator span { width: 6px; height: 6px; background: #666; border-radius: 50%; animation: bounce 1.4s infinite; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        .input-area { padding: 16px 24px; background: #1a1a1a; border-top: 1px solid #333; flex-shrink: 0; }
        .input-container { max-width: 900px; margin: 0 auto; display: flex; gap: 12px; align-items: flex-end; }
        .input-wrapper { flex: 1; position: relative; }
        textarea { width: 100%; background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 12px; padding: 12px 16px; color: #fff; font-size: 14px; resize: none; outline: none; min-height: 48px; max-height: 200px; font-family: inherit; transition: border-color 0.2s; }
        textarea:focus { border-color: #3b82f6; }
        textarea::placeholder { color: #666; }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .btn-send { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; box-shadow: 0 2px 8px rgba(59,130,246,0.3); }
        .btn-send:hover { background: linear-gradient(135deg, #2563eb, #1d4ed8); box-shadow: 0 4px 16px rgba(59,130,246,0.4); transform: translateY(-1px); }
        .btn-send:disabled { background: #3b82f680; box-shadow: none; cursor: not-allowed; transform: none; }
        .btn-clear { background: #2a2a2a; color: #a1a1aa; border: 1px solid #3a3a3a; }
        .btn-clear:hover { background: #333; color: #e5e5e5; }
        .input-hint { font-size: 12px; color: #555; margin-top: 8px; text-align: center; }
        .welcome { text-align: center; padding: 80px 20px 60px; color: #888; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .welcome .welcome-icon { font-size: 48px; margin-bottom: 16px; display: block; }
        .welcome h2 { font-size: 24px; color: #e5e5e5; margin-bottom: 12px; font-weight: 600; }
        .welcome p { font-size: 14px; line-height: 1.8; color: #666; max-width: 400px; margin: 0 auto; }
        
        .error-msg { background: #3f1212; border: 1px solid #5f2020; border-radius: 8px; padding: 10px 14px; color: #f87171; font-size: 13px; }

        /* 来源引用卡片 */
        .source-card { background: #161616; border: 1px solid #2a2a2a; border-radius: 10px; padding: 12px 16px; margin-top: 4px; align-self: flex-start; max-width: 85%; }
        .source-header { font-size: 12px; color: #888; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .source-list { display: flex; flex-direction: column; gap: 6px; }
        .source-item { padding: 8px 10px; background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
        .source-item:hover { border-color: #3b82f6; background: #1a2744; }
        .source-item-header { display: flex; justify-content: space-between; align-items: center; }
        .source-name { font-size: 12px; color: #93c5fd; font-weight: 500; }
        .source-score { font-size: 11px; color: #666; }
        .source-badge { font-size: 10px; color: #888; background: #2a2a2a; padding: 1px 6px; border-radius: 4px; margin-left: 6px; }
        .source-content { font-size: 12px; color: #a1a1aa; line-height: 1.5; margin-top: 6px; padding-top: 6px; border-top: 1px solid #2a2a2a; display: none; white-space: pre-wrap; }
        .source-content.open { display: block; }

        /* 打字机光标动画 */
        .cursor-blink::after { content: '▍'; animation: blink 0.8s infinite; color: #22c55e; }
        @keyframes blink { 50% { opacity: 0; } }

        /* 知识库快捷筛选（聊天输入区） */
        .chat-filter { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .chat-filter label { font-size: 12px; color: #666; white-space: nowrap; }
        .chat-filter select { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 6px; color: #ccc; font-size: 12px; padding: 4px 8px; max-width: 160px; }
        .chat-filter .kb-tag { font-size: 11px; color: #555; border: 1px solid #2a2a2a; border-radius: 4px; padding: 2px 8px; }
        
        /* 上传模态框 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; display: none; }
        .modal-overlay.show { display: flex; }
        .modal { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 24px; width: 400px; max-width: 90%; }
        .modal-title { font-size: 16px; color: #fff; margin-bottom: 16px; }
        .modal-close { float: right; background: none; border: none; color: #666; cursor: pointer; font-size: 18px; }
        .modal-close:hover { color: #fff; }
        .upload-area { border: 2px dashed #3a3a3a; border-radius: 8px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .upload-area:hover { border-color: #3b82f6; background: #161616; }
        .upload-area input { display: none; }
        .upload-icon { font-size: 32px; margin-bottom: 8px; }
        .upload-text { color: #888; font-size: 13px; }
        .upload-text span { color: #3b82f6; }
        .selected-file { margin-top: 12px; padding: 10px; background: #161616; border-radius: 6px; font-size: 12px; color: #ccc; display: none; }
        .selected-file.show { display: block; }
        .kb-select { margin-top: 12px; }
        .kb-select label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; }
        .kb-select select { width: 100%; padding: 8px 12px; background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 6px; color: #fff; font-size: 13px; }
        .modal-actions { margin-top: 16px; display: flex; gap: 8px; justify-content: flex-end; }
        .modal-btn { padding: 8px 16px; border-radius: 6px; border: none; font-size: 13px; cursor: pointer; }
        .modal-btn.cancel { background: #2a2a2a; color: #888; }
        .modal-btn.confirm { background: #3b82f6; color: #fff; }
        .modal-btn.confirm:hover { background: #2563eb; }
        .modal-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .upload-progress { margin-top: 12px; display: none; }
        .upload-progress.show { display: block; }
        .progress-bar { height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: #3b82f6; width: 0%; transition: width 0.3s; }
        .upload-status { margin-top: 8px; font-size: 12px; color: #888; }
        
        @keyframes msgFadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 8px rgba(59,130,246,0.1); } 50% { box-shadow: 0 0 20px rgba(59,130,246,0.25); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 会话列表 */
        .session-section { padding: 12px 16px; border-bottom: 1px solid #333; max-height: 260px; display: flex; flex-direction: column; }
        .session-section-title { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; flex-shrink: 0; }
        .session-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .session-list::-webkit-scrollbar { width: 4px; }
        .session-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .session-item { padding: 8px 10px; background: #161616; border: 1px solid #2a2a2a; border-radius: 6px; cursor: pointer; transition: all 0.15s; display: flex; justify-content: space-between; align-items: center; }
        .session-item:hover { border-color: #3b82f6; background: #1a2744; }
        .session-item.active { border-color: #3b82f6; background: #1e3a5f; }
        .session-item-info { flex: 1; min-width: 0; overflow: hidden; }
        .session-item-preview { font-size: 12px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .session-item-time { font-size: 10px; color: #555; margin-top: 2px; }
        .session-item-del { font-size: 12px; color: #555; background: none; border: none; cursor: pointer; padding: 2px 4px; border-radius: 3px; opacity: 0; transition: all 0.15s; flex-shrink: 0; }
        .session-item:hover .session-item-del { opacity: 1; }
        .session-item-del:hover { background: #dc2626; color: #fff; }
        .session-empty { text-align: center; padding: 20px; color: #555; font-size: 12px; }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo">🤖 <span>万事通助手</span></div>
            <button class="new-chat-btn" onclick="newChat()">+ 新建对话</button>
        </div>

        <!-- 会话列表 -->
        <div class="session-section">
            <div class="session-section-title">💬 对话历史</div>
            <div class="session-list" id="sessionList">
                <div class="session-empty">暂无历史对话</div>
            </div>
        </div>

        <!-- 知识库区域 -->
        <div class="kb-section">
            <div class="kb-section-header">
                <span class="kb-section-title">知识库</span>
                <button class="kb-add-btn" onclick="showCreateKbModal()" title="新建知识库">+</button>
            </div>
            <div class="kb-list" id="kbList">
                <div class="kb-item active" data-kb-id="1" onclick="selectKb(1)">
                    <div class="kb-item-name">默认知识库</div>
                    <div class="kb-item-info" id="kbInfo1">-</div>
                </div>
            </div>
        </div>
        
        <!-- 文档列表 -->
        <div class="doc-section">
            <div class="doc-section-title">
                <span>📄 文档列表</span>
                <button class="upload-btn" onclick="showUploadModal()">上传</button>
            </div>
            <div class="doc-list" id="docList">
                <div class="empty-docs">暂无文档<br>点击上方"上传"添加</div>
            </div>
        </div>
    </div>
    
    <!-- 主内容区 -->
    <div class="main">
        <div class="header">
            <h1>AI Agent</h1>
            <div class="header-info">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">未连接</span>
                <span id="sessionInfo"></span>
            </div>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="welcome">
                <span class="welcome-icon">🤖</span>
                <h2>万事通智能助手</h2>
                <p>我可以帮你：计算数学、联网搜索、知识库检索<br>同时会自动记住对话内容<br>试试问我："Python闭包是什么？"</p>
            </div>
        </div>
        
        <div class="input-area">
            <div class="chat-filter">
                <label>📚 知识库</label>
                <select id="chatKbFilter" onchange="currentKbId = parseInt(this.value);">
                    <option value="0">全部知识库</option>
                </select>
                <span class="kb-tag">默认检索当前知识库</span>
            </div>
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="messageInput" rows="1" placeholder="输入消息... (Shift+Enter换行, Enter发送)" onkeydown="handleKeyDown(event)"></textarea>
                </div>
                <button class="btn btn-send" id="sendBtn" onclick="sendMessage()">发送</button>
                <button class="btn btn-clear" onclick="clearChat()">清空</button>
            </div>
            <div class="input-hint">Enter 发送 | Shift+Enter 换行 | 知识库引用结果自动显示</div>
        </div>
    </div>
    
    <!-- 上传模态框 -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal">
            <button class="modal-close" onclick="hideUploadModal()">×</button>
            <div class="modal-title">上传文档</div>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept=".txt,.md,.pdf,.docx,.csv" onchange="handleFileSelect(event)">
                <div class="upload-icon">📁</div>
                <div class="upload-text">点击选择文件 或 拖拽到此处<br><span>支持 txt/md/pdf/docx/csv</span></div>
            </div>
            <div class="selected-file" id="selectedFile"></div>
            <div class="kb-select">
                <label>知识库</label>
                <select id="uploadKbSelect">
                    <option value="1">默认知识库</option>
                </select>
            </div>
            <div class="upload-progress" id="uploadProgress">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="upload-status" id="uploadStatus">上传中...</div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="hideUploadModal()">取消</button>
                <button class="modal-btn confirm" id="uploadConfirmBtn" onclick="uploadFile()" disabled>上传</button>
            </div>
        </div>
    </div>
    
    <!-- 创建知识库模态框 -->
    <div class="modal-overlay" id="createKbModal">
        <div class="modal">
            <button class="modal-close" onclick="hideCreateKbModal()">×</button>
            <div class="modal-title">新建知识库</div>
            <div class="kb-select">
                <label>知识库名称</label>
                <input type="text" id="newKbName" placeholder="输入知识库名称" style="width:100%;padding:8px 12px;background:#2a2a2a;border:1px solid #3a3a3a;border-radius:6px;color:#fff;font-size:13px;">
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="hideCreateKbModal()">取消</button>
                <button class="modal-btn confirm" onclick="createKb()">创建</button>
            </div>
        </div>
    </div>

    <script>
        let sessionId = '';
        let isStreaming = false;
        let currentAssistantDiv = null;
        let currentToolResults = [];
        let accumulatedText = '';
        let currentSources = [];
        let currentKbId = 1;
        let selectedFile = null;

        // 初始化（优先恢复已有会话 + 加载会话列表）
        async function init() {
            try {
                await restoreSession();
                setStatus('connected', '已连接');
                await loadSessionList();
                await loadKnowledgeBases();
                await loadDocuments();
                // 如果当前 session 有历史消息，加载到聊天区
                if (sessionId) {
                    await loadSessionHistory(sessionId);
                }
            } catch (e) {
                setStatus('error', '后端未启动');
                console.error(e);
            }
        }

        // 会话恢复（sessionStorage 持久化 + 优雅降级）
        async function restoreSession() {
            const savedSessionId = sessionStorage.getItem('sessionId');
            if (!savedSessionId) {
                await createNewSession();
                return;
            }
            // 向后端验证 session 是否有效（查 MySQL 中的历史）
            const res = await fetch(`/api/history/${savedSessionId}`);
            if (res.ok) {
                const data = await res.json();
                sessionId = savedSessionId;
                document.getElementById('sessionInfo').textContent = ` | Session: ${sessionId}`;
                // 如果有历史消息，加载到聊天区
                if (data.count > 0) {
                    renderHistoryMessages(data.history);
                }
                return;
            }
            // 服务重启或会话已删除 → 自动重建
            console.warn('Session expired, creating new one');
            sessionStorage.removeItem('sessionId');
            await createNewSession();
        }

        // 加载指定会话的历史消息到聊天区
        async function loadSessionHistory(sid) {
            try {
                const res = await fetch(`/api/history/${sid}`);
                if (!res.ok) return;
                const data = await res.json();
                if (data.count > 0) {
                    renderHistoryMessages(data.history);
                }
            } catch (e) {
                console.error('loadSessionHistory error:', e);
            }
        }

        // 渲染历史消息列表
        function renderHistoryMessages(history) {
            const container = document.getElementById('chatContainer');
            // 清空欢迎语
            container.innerHTML = '';
            for (const msg of history) {
                const role = msg.role === 'user' ? 'user' : 'assistant';
                const content = msg.content || '';
                addMessage(role, content);
            }
            scrollToBottom();
        }

        // 加载会话列表（侧边栏）
        async function loadSessionList() {
            try {
                const res = await fetch('/api/sessions/list');
                const data = await res.json();
                const listEl = document.getElementById('sessionList');
                if (!data.sessions || data.sessions.length === 0) {
                    listEl.innerHTML = '<div class="session-empty">暂无历史对话</div>';
                    return;
                }
                let html = '';
                for (const s of data.sessions) {
                    const isActive = s.session_id === sessionId;
                    const preview = s.preview || '新对话';
                    const time = formatTime(s.last_time);
                    html += '<div class="session-item ' + (isActive ? 'active' : '') + '" data-sid="' + s.session_id + '">';
                    html += '  <div class="session-item-info" onclick="switchSession(\'' + s.session_id + '\')">';
                    html += '    <div class="session-item-preview">' + escapeHtml(preview) + '</div>';
                    html += '    <div class="session-item-time">' + time + ' · ' + s.message_count + ' 条</div>';
                    html += '  </div>';
                    html += '  <button class="session-item-del" onclick="event.stopPropagation(); deleteSession(\'' + s.session_id + '\')" title="删除对话">✕</button>';
                    html += '</div>';
                }
                listEl.innerHTML = html;
                highlightCurrentSession();
            } catch (e) {
                console.error('loadSessionList error:', e);
            }
        }

        function highlightCurrentSession() {
            document.querySelectorAll('.session-item').forEach(function(el) {
                el.classList.toggle('active', el.dataset.sid === sessionId);
            });
        }

        function formatTime(isoStr) {
            if (!isoStr) return '';
            var d = new Date(isoStr);
            var now = new Date();
            function pad(n) { return String(n).padStart(2, '0'); }
            if (d.toDateString() === now.toDateString()) {
                return pad(d.getHours()) + ':' + pad(d.getMinutes());
            }
            var yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);
            if (d.toDateString() === yesterday.toDateString()) {
                return '昨天 ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
            }
            return (d.getMonth()+1) + '/' + d.getDate() + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
        }

        // 切换会话
        async function switchSession(sid) {
            if (sid === sessionId) return;
            sessionId = sid;
            sessionStorage.setItem('sessionId', sid);
            document.getElementById('sessionInfo').textContent = ' | Session: ' + sessionId;
            var container = document.getElementById('chatContainer');
            container.innerHTML = '';
            await loadSessionHistory(sid);
            highlightCurrentSession();
        }

        // 删除会话
        async function deleteSession(sid) {
            if (!confirm('确定删除该对话？')) return;
            try {
                var res = await fetch('/api/history/' + sid, { method: 'DELETE' });
                if (res.ok) {
                    if (sid === sessionId) {
                        await newChat();
                    }
                    await loadSessionList();
                }
            } catch (e) {
                console.error('deleteSession error:', e);
            }
        }

        // HTML 转义
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function createNewSession() {
            const res = await fetch('/api/session', { method: 'POST' });
            const data = await res.json();
            sessionId = data.session_id;
            sessionStorage.setItem('sessionId', sessionId);
            document.getElementById('sessionInfo').textContent = ` | Session: ${sessionId}`;
        }
        
        function setStatus(type, text) {
            document.getElementById('statusDot').className = `status-dot ${type}`;
            document.getElementById('statusText').textContent = text;
        }
        
        // 知识库相关
        async function loadKnowledgeBases() {
            try {
                const res = await fetch('/api/kb/list');
                const data = await res.json();
                if (data.success && data.knowledge_bases.length > 0) {
                    const kbList = document.getElementById('kbList');
                    kbList.innerHTML = '';
                    data.knowledge_bases.forEach(kb => {
                        const div = document.createElement('div');
                        div.className = `kb-item ${kb.kb_id == currentKbId ? 'active' : ''}`;
                        div.dataset.kbId = kb.kb_id;
                        div.onclick = () => selectKb(kb.kb_id);
                        const kbName = kb.kb_name || ('知识库 #' + kb.kb_id);
                        div.innerHTML = '<div class="kb-item-name">' + escapeHtml(kbName) + '</div><div class="kb-item-info">' + kb.docs + ' 个文档, ' + kb.doc_count + ' 个分块</div>';
                        kbList.appendChild(div);
                    });
                    updateKbSelect();
                }
            } catch (e) {
                console.error('加载知识库失败:', e);
            }
        }
        
        function updateKbSelect() {
            // 上传弹窗中的知识库选择
            const uploadSelect = document.getElementById('uploadKbSelect');
            uploadSelect.innerHTML = '';
            // 聊天区的知识库筛选
            const chatFilter = document.getElementById('chatKbFilter');
            chatFilter.innerHTML = '<option value="0">全部知识库</option>';

            document.querySelectorAll('.kb-item').forEach(item => {
                const kbId = item.dataset.kbId;
                const name = item.querySelector('.kb-item-name').textContent;
                // 上传弹窗
                const opt1 = document.createElement('option');
                opt1.value = kbId;
                opt1.textContent = name;
                uploadSelect.appendChild(opt1);
                // 聊天区筛选
                const opt2 = document.createElement('option');
                opt2.value = kbId;
                opt2.textContent = name;
                if (kbId == currentKbId) opt2.selected = true;
                chatFilter.appendChild(opt2);
            });
        }
        
        function selectKb(kbId) {
            currentKbId = kbId;
            document.querySelectorAll('.kb-item').forEach(item => {
                item.classList.toggle('active', item.dataset.kbId == kbId);
            });
            // 同步聊天区筛选下拉框
            const chatFilter = document.getElementById('chatKbFilter');
            if (chatFilter) {
                chatFilter.value = kbId;
            }
            loadDocuments();
        }
        
        async function loadDocuments() {
            const docList = document.getElementById('docList');
            try {
                const res = await fetch(`/api/kb/${currentKbId}/docs`);
                const data = await res.json();
                if (data.success && data.documents.length > 0) {
                    docList.innerHTML = '';
                    data.documents.forEach(doc => {
                        const div = document.createElement('div');
                        div.className = 'doc-item';
                        div.innerHTML = `
                            <div class="doc-info">
                                <div class="doc-name">${escapeHtml(doc.filename)}</div>
                                <div class="doc-meta">${doc.file_type} · ${doc.chunk_count}块 · ${doc.updated || '未知'}</div>
                            </div>
                            <button class="doc-delete" onclick="deleteDoc(${doc.doc_id})">删除</button>
                        `;
                        docList.appendChild(div);
                    });
                } else {
                    docList.innerHTML = '<div class="empty-docs">暂无文档<br>点击上方"上传"添加</div>';
                }
            } catch (e) {
                docList.innerHTML = '<div class="empty-docs">加载失败</div>';
            }
        }
        
        async function deleteDoc(docId) {
            if (!confirm('确定删除该文档？')) return;
            try {
                const res = await fetch(`/api/kb/${currentKbId}/doc/${docId}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    loadDocuments();
                    loadKnowledgeBases();
                } else {
                    alert('删除失败: ' + data.error);
                }
            } catch (e) {
                alert('删除失败');
            }
        }
        
        function showCreateKbModal() {
            document.getElementById('createKbModal').classList.add('show');
        }
        
        function hideCreateKbModal() {
            document.getElementById('createKbModal').classList.remove('show');
            document.getElementById('newKbName').value = '';
        }
        
        async function createKb() {
            const name = document.getElementById('newKbName').value.trim();
            if (!name) return;
            try {
                const res = await fetch('/api/kb/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `kb_name=${encodeURIComponent(name)}`
                });
                const data = await res.json();
                if (data.success) {
                    hideCreateKbModal();
                    loadKnowledgeBases();
                }
            } catch (e) {
                alert('创建失败');
            }
        }
        
        // 上传相关
        function showUploadModal() {
            document.getElementById('uploadModal').classList.add('show');
            document.getElementById('uploadKbSelect').value = currentKbId;
        }
        
        function hideUploadModal() {
            document.getElementById('uploadModal').classList.remove('show');
            document.getElementById('fileInput').value = '';
            document.getElementById('selectedFile').classList.remove('show');
            document.getElementById('selectedFile').textContent = '';
            document.getElementById('uploadProgress').classList.remove('show');
            document.getElementById('uploadConfirmBtn').disabled = true;
            selectedFile = null;
        }
        
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                const el = document.getElementById('selectedFile');
                el.textContent = `已选: ${file.name} (${formatSize(file.size)})`;
                el.classList.add('show');
                document.getElementById('uploadConfirmBtn').disabled = false;
            }
        }
        
        async function uploadFile() {
            if (!selectedFile) return;
            const kbId = document.getElementById('uploadKbSelect').value;
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('kb_id', kbId);
            
            const progressEl = document.getElementById('uploadProgress');
            const fillEl = document.getElementById('progressFill');
            const statusEl = document.getElementById('uploadStatus');
            const btn = document.getElementById('uploadConfirmBtn');
            
            progressEl.classList.add('show');
            fillEl.style.width = '30%';
            statusEl.textContent = '上传中...';
            btn.disabled = true;
            
            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                fillEl.style.width = '70%';
                const data = await res.json();
                fillEl.style.width = '100%';
                
                if (data.success) {
                    statusEl.textContent = `成功! ${data.chunk_count}个分块已入库`;
                    setTimeout(() => {
                        hideUploadModal();
                        loadDocuments();
                        loadKnowledgeBases();
                    }, 1500);
                } else {
                    statusEl.textContent = '上传失败: ' + (data.detail || '未知错误');
                    btn.disabled = false;
                }
            } catch (e) {
                statusEl.textContent = '上传失败: ' + e.message;
                btn.disabled = false;
            }
        }
        
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        }
        
        // 聊天相关
        function newChat() {
            sessionStorage.removeItem('sessionId');
            createNewSession().then(function() {
                var container = document.getElementById('chatContainer');
                container.innerHTML = '';
                loadSessionList();
            });
        }
        
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        function addMessage(role, content, isHtml) {
            var container = document.getElementById('chatContainer');
            var div = document.createElement('div');
            div.className = 'message ' + role;
            var avatarText = role === 'user' ? 'ME' : 'AI';
            var now = new Date();
            var pad = function(n) { return String(n).padStart(2, '0'); };
            var timeStr = pad(now.getHours()) + ':' + pad(now.getMinutes());
            var safeContent = isHtml ? content : escapeHtml(content);
            var finalContent = (role === 'assistant' && !isHtml) ? marked.parse(content) : safeContent; div.innerHTML = '<div class="avatar">' + avatarText + '</div><div class="message-content">' + finalContent + '<div class="msg-time">' + timeStr + '</div></div>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }
        
        function addToolCard(name, result) {
            const container = document.getElementById('chatContainer');
            const msgs = container.querySelectorAll('.message.assistant');
            let target = msgs[msgs.length - 1];
            if (!target) return;
            let toolCard = target.querySelector('.tool-card');
            if (!toolCard) {
                toolCard = document.createElement('div');
                toolCard.className = 'tool-card';
                target.querySelector('.message-content').appendChild(toolCard);
            }
            const card = document.createElement('div');
            card.className = 'tool-result';
            card.textContent = `[${name}] ${result}`;
            toolCard.appendChild(card);
            container.scrollTop = container.scrollHeight;
        }
        
        function showTyping() {
            if (document.querySelector('.typing-indicator')) return;
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'message assistant typing';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="avatar">AI</div>
                <div class="message-content typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function addError(text) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'error-msg';
            div.textContent = `Error: ${text}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || isStreaming) return;

            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';
            isStreaming = true;
            document.getElementById('sendBtn').disabled = true;
            showTyping();

            accumulatedText = '';
            currentToolResults = [];
            currentSources = [];

            // 携带当前知识库筛选
            const kbFilters = currentKbId ? [currentKbId] : [];

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: sessionId, kb_ids: kbFilters })
                });

                removeTyping();
                const assistantDiv = addMessage('assistant', '');
                currentAssistantDiv = assistantDiv;
                const contentDiv = assistantDiv.querySelector('.message-content');
                contentDiv.innerHTML = '';

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let hasFinalOutput = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        try {
                            const event = JSON.parse(line.slice(6));

                            if (event.type === 'token') {
                                accumulatedText += event.content;
                                contentDiv.innerHTML = marked.parse(accumulatedText);
                                // 光标闪烁
                                contentDiv.classList.remove('cursor-blink');
                                void contentDiv.offsetWidth;
                                contentDiv.classList.add('cursor-blink');
                                scrollToBottom();
                            } else if (event.type === 'tool_start' || event.type === 'tool_call') {
                                const toolName = event.name || 'tool';
                                accumulatedText += '\n[🛠 调用工具: ' + toolName + '...]';
                                contentDiv.innerHTML = marked.parse(accumulatedText);
                                scrollToBottom();
                            } else if (event.type === 'tool_result') {
                                const result = event.result || '';
                                addToolCard('结果', result);
                                currentToolResults.push({ name: 'tool', result });
                                scrollToBottom();
                            } else if (event.type === 'source') {
                                // 收集引用来源（等待 final_output 后统一展示）
                                if (event.sources) {
                                    currentSources = currentSources.concat(event.sources);
                                }
                            } else if (event.type === 'final_output') {
                                hasFinalOutput = true;
                                // 显示引用来源卡片
                                if (currentSources.length > 0) {
                                    renderSourceCard(currentSources, assistantDiv);
                                }
                                // 移除光标动画
                                contentDiv.classList.remove('cursor-blink');
                            } else if (event.type === 'error') {
                                addError(event.content);
                            }
                        } catch (e) { }
                    }
                }

                // 流结束后再检查一次（如果后端没发 final_output 类型）
                if (!hasFinalOutput && currentSources.length > 0) {
                    renderSourceCard(currentSources, assistantDiv);
                }

                if (!accumulatedText && currentToolResults.length > 0) {
                    contentDiv.textContent = '[工具调用完成]';
                }
                contentDiv.classList.remove('cursor-blink');
            } catch (e) {
                removeTyping();
                addError('请求失败: ' + e.message);
            } finally {
                isStreaming = false;
                document.getElementById('sendBtn').disabled = false;
                scrollToBottom();
                // 刷新会话列表（更新预览和时间）
                loadSessionList();
            }
        }

        // 渲染引用来源卡片
        function renderSourceCard(sources, assistantDiv) {
            if (!sources || sources.length === 0) return;
            const container = document.getElementById('chatContainer');
            const card = document.createElement('div');
            card.className = 'source-card';
            let itemsHtml = sources.map((s, idx) => {
                const filename = s.filename || s.file_name || '未知文件';
                const score = s.score || s.rrf_score || 0;
                const snippet = s.snippet || s.content || '';
                const badge = s.source || 'knowledge';
                return `
                    <div class="source-item" onclick="toggleSource(this)">
                        <div class="source-item-header">
                            <span class="source-name">${escapeHtml(filename)}</span>
                            <span>
                                <span class="source-badge">${escapeHtml(badge)}</span>
                                <span class="source-score">相关度 ${(score * 100).toFixed(0)}%</span>
                            </span>
                        </div>
                        <div class="source-content">${escapeHtml(snippet.substring(0, 300))}</div>
                    </div>
                `;
            }).join('');
            card.innerHTML = `<div class="source-header">📚 参考资料 (${sources.length})</div><div class="source-list">${itemsHtml}</div>`;
            container.appendChild(card);
            scrollToBottom();
        }

        // 展开/折叠来源内容
        function toggleSource(el) {
            const content = el.querySelector('.source-content');
            if (content) {
                content.classList.toggle('open');
            }
        }
        
        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }
        
        function clearChat() {
            var container = document.getElementById('chatContainer');
            container.innerHTML = '<div class="welcome"><span class="welcome-icon">🤖</span><h2>万事通智能助手</h2><p>开始新的对话吧！</p></div>';
            accumulatedText = '';
            currentSources = [];
            currentToolResults = [];
        }
        
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });
        
        init();
    </script>
</body>
</html>
